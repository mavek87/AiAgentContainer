x-agent-base: &agent-base
  build: .
  image: ai-agent-container
  # Essential: use your UID so files created in the project belong to you
  user: "${MY_UID:-1000}:${MY_GID:-1000}"
  hostname: ai-agent-container-${SESSION_NAME}
  environment:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - HOME=/home/ubuntu
    - SESSION_NAME=${SESSION_NAME:-}
    # SSH agent forwarding: shares host SSH keys with the container
    - SSH_AUTH_SOCK=/ssh-agent
    # Permission mode: 'false' (default) = autonomous, 'true' = ask before each action
    - AGENT_ASK_PERMISSIONS=${AGENT_ASK_PERMISSIONS:-false}
  stdin_open: true
  tty: true

services:
  # Persistent mode: the agent's home survives between sessions
  agent:
    <<: *agent-base
    volumes:
      - ${TARGET_PATH:-.}:/app
      - ai_home_volume:/home/ubuntu
      - ./config/agent-rules.md:/home/ubuntu/.claude/CLAUDE.md
      - ./config/agent-rules.md:/home/ubuntu/.config/opencode/AGENTS.md
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro

  # Ephemeral mode: the home is destroyed when the container is closed
  agent-ephemeral:
    <<: *agent-base
    volumes:
      - ${TARGET_PATH:-.}:/app
      - ./config/agent-rules.md:/home/ubuntu/.claude/CLAUDE.md
      - ./config/agent-rules.md:/home/ubuntu/.config/opencode/AGENTS.md
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro

volumes:
  ai_home_volume:
